version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beautyflow-postgres
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: beautyflow_admin
      POSTGRES_PASSWORD: admin_password_secure_2026
      POSTGRES_DB: beautyflow_default
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - beautyflow-network

  redis:
    image: redis:7.2-alpine
    container_name: beautyflow-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - beautyflow-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: beautyflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - beautyflow-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: beautyflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - beautyflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  beautyflow-network:
    driver: bridge
