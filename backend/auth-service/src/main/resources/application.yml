server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5439/beautyflow_auth
    username: beautyflow_admin
    password: admin_password_secure_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:mock-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:mock-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

beautyflow:
  jwt:
    secret: dGhlLXNlY3JldC1rZXktZm9yLWJlYXV0eWZsb3ctc2Fhcy0yMDI2LW11c3QtYmUtbGFyZ2UtZW5vdWdoLXRvLWJlLXNhZmU=
    expiration-ms: 86400000 # 24 Hours
    refresh-expiration-ms: 604800000 # 7 Days
  google:
    client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:mock-twilio-sid}
    auth-token: ${TWILIO_AUTH_TOKEN:mock-twilio-token}
    from-number: ${TWILIO_PHONE_NUMBER:mock-twilio-number}
